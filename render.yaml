# Render Blueprint：数据库 + 认证 API + Qwen 代理（单仓库多服务）
# 在 Render Dashboard 用此文件创建/关联服务；也可仅用其中部分服务。

services:
  - type: pserv
    name: ai-franchteacher-db
    env: docker
    plan: free
    region: oregon
    ipAllowList: []

  - type: web
    name: ai-franchteacher-auth
    runtime: node
    region: oregon
    plan: free
    rootDir: auth-server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ai-franchteacher-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d
      - key: BCRYPT_ROUNDS
        value: 10
      - key: ALLOWED_ORIGINS
        sync: false
    autoDeploy: true

  - type: web
    name: franch-teacher-proxy
    runtime: node
    region: oregon
    plan: free
    rootDir: proxy
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: QWEN_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://baronsue.github.io,http://localhost:5500,http://127.0.0.1:5500
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true
